<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Readings</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 40px;
        }
        h2 {
            color: #007BFF;
        }
        .sensor-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .sensor-box {
            border: 2px solid #007BFF;
            padding: 20px;
            border-radius: 10px;
            min-width: 150px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
          <ul class="navbar">
            <!-- Logo and H2FLOW on the left -->
            <li class="logo">
              <a href="index.html" class="logo-link">
                <img src="images/logo.webp" alt="H2FLOW Logo" class="logo-img">
                <span class="logo-text">H2FLOW</span>
              </a>
            </li>
      
            <!-- Navigation links on the right -->
            <div class="nav-links">
              <li><a href="about.html" class="nav-link">About</a></li>
              <li><a href="product.html" class="nav-link">Product</a></li>
              <li><a href="equipment.html" class="nav-link">Equipment</a></li>
              <li><a href="contact.html" class="nav-link">Contact</a></li>
              <li><a href="readings.html" class="nav-link">Readings</a></li>
            </div>
          </ul>
        </nav>
      </header>

    <h2>Live Sensor Readings</h2>
    
    <div class="sensor-container">
        <div class="sensor-box">
            <h3>Touch Sensor</h3>
            <p id="touch-sensor">Loading...</p>
        </div>
        <div class="sensor-box">
            <h3>Time-of-Flight</h3>
            <p id="tof-sensor">Loading...</p>
        </div>
        <div class="sensor-box">
            <h3>Air Quality</h3>
            <p id="air-quality-sensor">Loading...</p>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>

</body>
</html>
