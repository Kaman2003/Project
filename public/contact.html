<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>h2flow - Contact</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Simple styles for the contact form */
    .contact-form {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f4f4f4;
      border-radius: 10px;
    }
    .contact-form h3 {
      margin-bottom: 20px;
      text-align: center;
    }
    .contact-form label {
      display: block;
      margin-bottom: 5px;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .contact-form button {
      display: block;
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
    }
    .contact-form button:hover {
      background: #1e40af;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <nav>
      <ul class="navbar">
        <!-- Logo and H2FLOW on the left -->
        <li class="logo">
          <a href="index.html" class="logo-link">
            <img src="./images/logo.webp" alt="H2FLOW Logo" class="logo-img">
            <span class="logo-text">H2FLOW</span>
          </a>
        </li>
  
        <!-- Navigation links on the right -->
        <div class="nav-links">
          <li><a href="about.html" class="nav-link">About</a></li>
          <li><a href="product.html" class="nav-link">Product</a></li>
          <li><a href="equipment.html" class="nav-link">Equipment</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
          <li><a href="readings.html" class="nav-link">Readings</a></li>
        </div>
      </ul>
    </nav>
  </header>

  <!-- Contact Form -->
  <section class="contact">
    <div class="contact-form">
      <h3>Contact Us</h3>
      <form action="#" method="post">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email" required />

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Your message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 h2flow. All rights reserved.</p>
  </footer>
</body>
</html>
